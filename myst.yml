version: 1
project:
  title: National Spatial Data Infrastructure
  authors:
     - name: Alois Napitalai
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  github: anapitalai/pngnsdi
  thebe:
    binder:
      repo: anapitalai/pngnsdi
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - pages/references.bib
  toc:
    - file: sly.md
    - title: NSDI Wbsite
    - file: index.md
    - title: Preface
      children:
        - file: pages/preface.md
    - title: Getting Started
      children:
        - file: pages/part01/getting-started.md
        - file: pages/part01/installation.md
    - title: Presentations
      children:
        - file: pages/part02/first-example.md
    - file: blog.md
      children:
        - file: tags/myst-markdown.md
        - file: tags/tutorial.md
        - file: tags/github-pages.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    style: custom.css
    # analytics_google: G-XXX
  actions:
    - title: RSS
      url: https://opengeos.org/myst-website-template/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
